<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronomètre d'épreuve</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; }

  /* ── THÈME NOIR (défaut) ── */
  body {
    --bg:           #0d0f14;
    --surface:      #13161e;
    --horloge-bg:   #13161e;
    --horloge-bord: #5a6070;
    --horloge-txt:  #ffffff;
    --horloge-lbl:  #5a6070;
    --input-bord:   #2a3040;
    --valeur-txt:   #ffffff;
    --restant-bg:   #181600;
    --urgent-bg:    #1a0a0a;
    background: var(--bg);
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr 1fr 1fr 1fr 1.7fr;
    gap: 3px;
    padding: 1.2vh 1.5vw;
    transition: background 0.3s;
  }

  /* ── THÈME BLANC ── */
  body.light {
    --bg:           #f0f2f7;
    --surface:      #ffffff;
    --horloge-bg:   #ffffff;
    --horloge-bord: #94a3b8;
    --horloge-txt:  #0f172a;
    --horloge-lbl:  #94a3b8;
    --input-bord:   #cbd5e1;
    --valeur-txt:   #0f172a;
    --restant-bg:   #fffbeb;
    --urgent-bg:    #fff1f2;
  }

  /* Couleurs d'accent — identiques dans les deux thèmes */
  :root {
    --bleu:   #2563eb;
    --violet: #7c3aed;
    --orange: #ea580c;
    --vert:   #059669;
    --jaune:  #d97706;
    --rouge:  #dc2626;
  }

  /* Horloge */
  #horloge {
    font-family: 'DM Mono', monospace;
    font-size: 5.5vh;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--horloge-txt);
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.4vh 0;
    background: var(--horloge-bg);
    border-radius: 5px;
    border-left: 5px solid var(--horloge-bord);
    transition: background 0.3s, color 0.3s;
  }

  /* Blocs */
  .bloc {
    border-radius: 5px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0.6vh 2.5vw;
    gap: 0.3vh;
    background: var(--surface);
    border-left: 5px solid #ccc;
    transition: background 0.3s;
  }

  .label {
    font-size: 2.2vh;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .valeur {
    font-family: 'DM Mono', monospace;
    font-size: 5vh;
    font-weight: 500;
    letter-spacing: 0.06em;
    line-height: 1.1;
    color: var(--valeur-txt);
  }

  input {
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--input-bord);
    font-family: 'DM Mono', monospace;
    font-size: 5vh;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--valeur-txt);
    width: 100%;
    outline: none;
    padding-bottom: 0.2vh;
    transition: border-color 0.2s, color 0.3s;
  }

  input::placeholder { font-size: 0.5em; opacity: 0.35; }

  /* Couleurs par bloc */
  .bloc-debut  { border-left-color: var(--bleu); }
  .bloc-debut  .label { color: var(--bleu); }
  .bloc-debut  input:focus { border-bottom-color: var(--bleu); }

  .bloc-duree  { border-left-color: var(--violet); }
  .bloc-duree  .label { color: var(--violet); }
  .bloc-duree  input:focus { border-bottom-color: var(--violet); }

  .bloc-sortie { border-left-color: var(--orange); }
  .bloc-sortie .label { color: var(--orange); }
  .bloc-sortie input:focus { border-bottom-color: var(--orange); }

  .bloc-fin    { border-left-color: var(--vert); }
  .bloc-fin    .label { color: var(--vert); }

  .bloc-restant {
    border-left-color: var(--jaune);
    background: var(--restant-bg);
  }
  .bloc-restant .label  { color: var(--jaune); font-size: 2.5vh; }
  .bloc-restant .valeur { color: var(--jaune); font-size: 7.5vh; }

  .bloc-restant.urgent {
    border-left-color: var(--rouge);
    background: var(--urgent-bg);
  }
  .bloc-restant.urgent .label { color: var(--rouge); }
  .bloc-restant.urgent .valeur {
    color: var(--rouge);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.45; }
  }

  /* Boutons fixes */
  .btn-fixe {
    position: fixed;
    bottom: 1rem;
    background: var(--surface);
    border: 1px solid var(--input-bord);
    color: var(--horloge-lbl);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    border-radius: 3px;
    transition: color 0.2s, border-color 0.2s, background 0.3s;
  }

  #btn-fullscreen { right: 1rem; }
  #btn-theme      { right: 9rem; }

  .btn-fixe:hover { color: var(--horloge-txt); border-color: var(--jaune); }
</style>
</head>
<body id="body">

<div id="horloge">
  <div style="display:flex;flex-direction:column;align-items:center;gap:0.3vh;">
    <span style="font-family:'DM Sans',sans-serif;font-size:2vh;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--horloge-lbl);">Heure actuelle</span>
    <span id="horloge-val">--:--:--</span>
  </div>
</div>

<div class="bloc bloc-debut">
  <div class="label">Heure de début</div>
  <div class="valeur">
    <input type="text" id="debut" placeholder="ex : 09:00" maxlength="8" autocomplete="off">
  </div>
</div>

<div class="bloc bloc-duree">
  <div class="label">Durée de l'épreuve</div>
  <div class="valeur">
    <input type="text" id="duree" placeholder="ex : 2:00" maxlength="8" autocomplete="off">
  </div>
</div>

<div class="bloc bloc-sortie">
  <div class="label">Sortie autorisée à partir de</div>
  <div class="valeur">
    <input type="text" id="sortie" placeholder="ex : 10:00" maxlength="8" autocomplete="off">
  </div>
</div>

<div class="bloc bloc-fin">
  <div class="label">Heure de fin</div>
  <div class="valeur" id="fin">—</div>
</div>

<div class="bloc bloc-restant" id="bloc-restant">
  <div class="label">Temps restant</div>
  <div class="valeur" id="restant">—</div>
</div>

<button class="btn-fixe" id="btn-theme" onclick="basculerTheme()">☀ Fond blanc</button>
<button class="btn-fixe" id="btn-fullscreen" onclick="basculerPleinEcran()">⛶ Plein écran</button>

<script>
  var modeClaire = false;

  function basculerTheme() {
    modeClaire = !modeClaire;
    document.getElementById('body').className = modeClaire ? 'light' : '';
    document.getElementById('btn-theme').textContent = modeClaire ? '🌙 Fond noir' : '☀ Fond blanc';
  }

  function padZ(n) { return String(n).padStart(2,'0'); }

  function parseHeure(str) {
    var parts = str.trim().split(':').map(Number);
    if (!str.trim() || parts.some(isNaN)) return null;
    return (parts[0]||0)*3600 + (parts[1]||0)*60 + (parts[2]||0);
  }

  function formatHeure(s) {
    if (s < 0) s = 0;
    return padZ(Math.floor(s/3600)) + ':' + padZ(Math.floor((s%3600)/60)) + ':' + padZ(s%60);
  }

  function maintenant() {
    var d = new Date();
    return d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();
  }

  function actualiser() {
    var d = new Date();
    document.getElementById('horloge-val').textContent =
      padZ(d.getHours()) + ':' + padZ(d.getMinutes()) + ':' + padZ(d.getSeconds());

    var debut = parseHeure(document.getElementById('debut').value);
    var duree = parseHeure(document.getElementById('duree').value);
    var bloc  = document.getElementById('bloc-restant');

    if (debut !== null && duree !== null) {
      var finS  = debut + duree;
      document.getElementById('fin').textContent = formatHeure(finS);
      var reste = finS - maintenant();
      document.getElementById('restant').textContent = reste <= 0 ? '00:00:00' : formatHeure(reste);
      bloc.className = 'bloc bloc-restant' + (reste > 0 && reste <= 900 ? ' urgent' : '');
    } else {
      document.getElementById('fin').textContent = '—';
      document.getElementById('restant').textContent = '—';
      bloc.className = 'bloc bloc-restant';
    }
  }

  function basculerPleinEcran() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }

  setInterval(actualiser, 1000);
  actualiser();
</script>
</body>
</html>
